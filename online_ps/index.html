<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 统计PV -->
    <script src="../config.js"></script>
    <script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
    <script>LA.init({id:SITE_CONFIG.analytics.id,ck:SITE_CONFIG.analytics.ck})</script>
    <!-- 统计PV -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>在线图片编辑器 | 简易PS工具 - 饺子与肉包工具箱</title>
    <meta name="keywords" content="在线PS,图片编辑,照片编辑,在线修图,画笔工具,滤镜效果,图片处理">
    <meta name="description" content="在线简易PS工具，提供画笔、橡皮擦、矩形绘制、文字添加等功能。支持亮度、对比度、灰度等滤镜调整。纯前端处理，无需上传，保护隐私。">
    <meta name="author" content="饺子与肉包">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:title" content="在线图片编辑器 | 简易PS">
    <meta property="og:description" content="免费在线图片编辑工具，基础修图功能">
    <meta property="og:site_name" content="饺子与肉包工具箱">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <!-- 动态设置域名 -->
    <script>
        const DOMAIN = SITE_CONFIG.domain;
        document.addEventListener('DOMContentLoaded', function() {
            var canonical = document.querySelector('link[rel="canonical"]');
            if (canonical) canonical.href = DOMAIN + '/online_ps/';
            
            var ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.content = DOMAIN + '/online_ps/';
        });
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <a href="../index.html" class="back-home-btn" title="返回首页">
            <span class="back-icon">🏠</span>
            <span class="back-text">首页</span>
        </a>
        <h1>🎨 在线简易PS</h1>
        <div class="header-actions">
            <button id="btn-undo">撤销</button>
            <button id="btn-redo">重做</button>
            <button id="btn-download">导出图片</button>
            <label class="file-upload">
                上传图片
                <input type="file" id="upload-image" accept="image/*">
            </label>
        </div>
    </header>

    <main class="app-main">
        <!-- 左侧工具栏 -->
        <aside class="toolbar">
            <h3>工具</h3>
            <button class="tool-btn active" data-tool="brush">画笔</button>
            <button class="tool-btn" data-tool="eraser">橡皮擦</button>
            <button class="tool-btn" data-tool="rect">矩形</button>
            <button class="tool-btn" data-tool="text">文字</button>
            <div class="tool-settings">
                <label>颜色: <input type="color" id="color-picker" value="#000000"></label>
                <label>大小: <input type="range" id="brush-size" min="1" max="50" value="5"></label>
            </div>
        </aside>

        <!-- 中间画布区域 -->
        <div class="canvas-wrapper">
            <canvas id="editor-canvas" width="800" height="600"></canvas>
        </div>

        <!-- 右侧滤镜面板 -->
        <aside class="filter-panel">
            <h3>滤镜/调整</h3>
            <div class="filter-control">
                <label>亮度: <input type="range" id="filter-brightness" min="-100" max="100" value="0"></label>
            </div>
            <div class="filter-control">
                <label>对比度: <input type="range" id="filter-contrast" min="-100" max="100" value="0"></label>
            </div>
            <div class="filter-control">
                <label>灰度: <input type="range" id="filter-grayscale" min="0" max="100" value="0"></label>
            </div>
            <button id="apply-filters">应用滤镜</button>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
