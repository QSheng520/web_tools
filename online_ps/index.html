<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线简易PS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <a href="../index.html" class="back-home-btn" title="返回首页">
            <span class="back-icon">🏠</span>
            <span class="back-text">首页</span>
        </a>
        <h1>🎨 在线简易PS</h1>
        <div class="header-actions">
            <button id="btn-undo">撤销</button>
            <button id="btn-redo">重做</button>
            <button id="btn-download">导出图片</button>
            <label class="file-upload">
                上传图片
                <input type="file" id="upload-image" accept="image/*">
            </label>
        </div>
    </header>

    <main class="app-main">
        <!-- 左侧工具栏 -->
        <aside class="toolbar">
            <h3>工具</h3>
            <button class="tool-btn active" data-tool="brush">画笔</button>
            <button class="tool-btn" data-tool="eraser">橡皮擦</button>
            <button class="tool-btn" data-tool="rect">矩形</button>
            <button class="tool-btn" data-tool="text">文字</button>
            <div class="tool-settings">
                <label>颜色: <input type="color" id="color-picker" value="#000000"></label>
                <label>大小: <input type="range" id="brush-size" min="1" max="50" value="5"></label>
            </div>
        </aside>

        <!-- 中间画布区域 -->
        <div class="canvas-wrapper">
            <canvas id="editor-canvas" width="800" height="600"></canvas>
        </div>

        <!-- 右侧滤镜面板 -->
        <aside class="filter-panel">
            <h3>滤镜/调整</h3>
            <div class="filter-control">
                <label>亮度: <input type="range" id="filter-brightness" min="-100" max="100" value="0"></label>
            </div>
            <div class="filter-control">
                <label>对比度: <input type="range" id="filter-contrast" min="-100" max="100" value="0"></label>
            </div>
            <div class="filter-control">
                <label>灰度: <input type="range" id="filter-grayscale" min="0" max="100" value="0"></label>
            </div>
            <button id="apply-filters">应用滤镜</button>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
