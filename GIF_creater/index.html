<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <!-- 统计PV -->
    <script src="../config.js"></script>
    <script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
    <script>LA.init({id:SITE_CONFIG.analytics.id,ck:SITE_CONFIG.analytics.ck})</script>
    <!-- 统计PV -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>专业GIF生成器 - 图片序列/视频转GIF</title>
    <!-- 引入 gif.js 核心库 (使用CDN，并指定worker路径) -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <!-- 返回首页按钮 -->
    <a href="../index.html" class="back-home-btn">🏠 返回首页</a>
    
    <div class="header">
        <h1>🎞️ GIF 魔法工坊</h1>
        <p>图片序列 → GIF &nbsp;|&nbsp; 视频片段 → GIF &nbsp;|&nbsp; 完全前端处理，隐私安全</p>
    </div>

    <div class="dashboard">
        <!-- 左侧：图片生成器 -->
        <div class="card">
            <div class="card-header">
                <h2>🖼️ 图片序列生成 GIF</h2>
                <p style="margin: 5px 0 0; font-size:0.8rem;">上传多张图片，调整顺序，合成动画</p>
            </div>
            <div class="card-body">
                <div class="upload-area" id="imageUploadArea">
                    <div class="upload-icon">📸 +</div>
                    <div>点击或拖拽上传多张图片 (PNG/JPG/WebP)</div>
                    <input type="file" id="imageUploadInput" multiple accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
                </div>
                <div id="imageListContainer" class="image-list" style="min-height: 100px;">
                    <div class="info-text" style="text-align:center;">暂无图片，请上传</div>
                </div>
                <div class="param-row">
                    <div class="param-group">
                        <label>⏱️ 帧延迟 (ms)</label>
                        <input type="number" id="imgDelay" value="120" step="10" min="20" max="1000">
                    </div>
                    <div class="param-group">
                        <label>📐 输出宽度 (px)</label>
                        <input type="number" id="imgWidth" placeholder="自动" value="480" step="10">
                    </div>
                    <div class="param-group">
                        <label>📏 输出高度 (px)</label>
                        <input type="number" id="imgHeight" placeholder="自动" value="0" step="10">
                        <small style="font-size:10px;">0=自动等比</small>
                    </div>
                    <div class="param-group">
                        <label>✨ 质量 (1~30)</label>
                        <input type="number" id="imgQuality" value="10" min="1" max="30">
                    </div>
                </div>
                <button class="btn btn-generate" id="generateImageGifBtn">✨ 生成 GIF (图片序列)</button>
                <div id="imageProgressArea" style="margin-top: 10px;"></div>
            </div>
        </div>

        <!-- 右侧：视频生成器 -->
        <div class="card">
            <div class="card-header">
                <h2>🎬 视频转 GIF</h2>
                <p style="margin: 5px 0 0; font-size:0.8rem;">裁剪区间，智能抽帧，生成动画</p>
            </div>
            <div class="card-body">
                <div class="upload-area" id="videoUploadArea">
                    <div class="upload-icon">🎥 +</div>
                    <div>上传视频文件 (MP4/MOV/WebM)</div>
                    <input type="file" id="videoUploadInput" accept="video/mp4,video/quicktime,video/webm" style="display:none;">
                </div>
                <div id="videoPreviewContainer" style="display:none;">
                    <div class="video-preview">
                        <video id="videoPreview" controls muted loop></video>
                    </div>
                    <div class="param-row">
                        <div class="param-group">
                            <label>⏱️ 起始时间(秒)</label>
                            <input type="number" id="startTime" value="0" step="0.5" min="0">
                        </div>
                        <div class="param-group">
                            <label>⏱️ 结束时间(秒)</label>
                            <input type="number" id="endTime" value="3" step="0.5" min="0">
                        </div>
                        <div class="param-group">
                            <label>🎞️ 抽取帧数</label>
                            <input type="number" id="frameCount" value="18" min="2" max="60">
                        </div>
                    </div>
                </div>
                <div class="param-row">
                    <div class="param-group">
                        <label>⏲️ 每帧延迟(ms)</label>
                        <input type="number" id="videoDelay" value="80" step="10" min="20">
                    </div>
                    <div class="param-group">
                        <label>📐 输出宽度 (px)</label>
                        <input type="number" id="videoOutWidth" value="480" step="10">
                    </div>
                    <div class="param-group">
                        <label>📏 输出高度 (px)</label>
                        <input type="number" id="videoOutHeight" value="0" step="10">
                    </div>
                    <div class="param-group">
                        <label>✨ 质量 (1~30)</label>
                        <input type="number" id="videoQuality" value="10" min="1" max="30">
                    </div>
                </div>
                <button class="btn btn-generate" id="generateVideoGifBtn" disabled>🎞️ 生成 GIF (需先上传视频)</button>
                <div id="videoProgressArea" style="margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <!-- 共用结果展示区 -->
    <div class="result-area" id="resultArea" style="margin-top: 30px;">
        <h3>📀 生成的 GIF 预览</h3>
        <div id="gifPreviewContainer">
            <img id="previewGifImg" class="result-gif" style="display:none;" alt="生成的GIF">
            <div id="noGifMsg" class="info-text">暂无生成的GIF，上传素材并点击生成</div>
        </div>
        <a id="downloadGifLink" class="btn btn-secondary download-btn" style="display:none;">⬇️ 下载 GIF</a>
    </div>
    <footer>⚡ 纯前端实现 | 使用 gif.js 引擎 | 视频帧提取基于Canvas | 所有处理均在本地</footer>
</div>

<!-- 引入自定义脚本 -->
<script src="js/script.js"></script>
</body>
</html>
