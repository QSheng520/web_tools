<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 统计PV -->
    <script src="../config.js"></script>
    <script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
    <script>LA.init({id:SITE_CONFIG.analytics.id,ck:SITE_CONFIG.analytics.ck})</script>
    <!-- 统计PV -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- SEO Meta Tags -->
    <title>Emoji表情大全 | 一键复制表情符号 - 饺子与肉包工具箱</title>
    <meta name="keywords" content="Emoji表情,表情符号,emoji复制,表情大全,emoji搜索,特殊符号">
    <meta name="description" content="Emoji表情大全，收录常用表情符号，支持分类筛选和关键词搜索。点击即可复制到剪贴板，方便快捷。包含笑脸、动物、爱心等各种表情。">
    <meta name="author" content="饺子与肉包">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://qsheng520.github.io/web_tools/emoji/">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://qsheng520.github.io/web_tools/emoji/">
    <meta property="og:title" content="Emoji表情大全 | 一键复制">
    <meta property="og:description" content="免费在线使用和复制Emoji表情符号">
    <meta property="og:site_name" content="饺子与肉包工具箱">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <!-- 动态设置域名 -->
    <script>
        const DOMAIN = SITE_CONFIG.domain;
        document.addEventListener('DOMContentLoaded', function() {
            var canonical = document.querySelector('link[rel="canonical"]');
            if (canonical) canonical.href = DOMAIN + '/emoji/';
            
            var ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.content = DOMAIN + '/emoji/';
        });
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <a href="../index.html" class="back-home-btn" title="返回首页">
            <span class="back-icon">🏠</span>
            <span class="back-text">首页</span>
        </a>
        <h1>Emoji 表情大全</h1>
        <div class="sub">📋 点击任意表情 — 自动复制，轻松使用</div>
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索表情名称或直接输入关键词 (笑脸、动物、爱心...)" autocomplete="off">
                <button class="clear-search" id="clearSearchBtn" aria-label="清空搜索">✖</button>
            </div>
        </div>
    </div>

    <div class="categories" id="categoriesContainer">
        <!-- 分类按钮动态生成 + 静态保底，但JS会动态渲染 -->
    </div>

    <div class="stats-bar">
        <div class="result-count" id="resultCount">✨ 加载表情中...</div>
        <div class="copy-tip">💡 点击卡片即复制 Emoji 到剪贴板</div>
    </div>

    <div id="emojiGrid" class="emoji-grid">
        <!-- 动态渲染表情卡片 -->
        <div class="empty-state">🎨 表情正在赶来...</div>
    </div>
    <div class="footer">
        📦 收录常用表情符号 | 快速复制 | 分类筛选 | 支持关键词搜索
    </div>
</div>

<div id="toastMsg" class="toast-message">✅ 已复制</div>

<script src="js/script.js"></script>
</body>
</html>
