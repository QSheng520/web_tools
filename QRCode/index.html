<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 统计PV -->
    <script src="../config.js"></script>
    <script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
    <script>LA.init({id:SITE_CONFIG.analytics.id,ck:SITE_CONFIG.analytics.ck})</script>
    <!-- 统计PV -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- SEO Meta Tags -->
    <title>二维码生成器 | 支持Logo与配色定制 - 饺子与肉包工具箱</title>
    <meta name="keywords" content="二维码生成器,QR Code,二维码制作,在线二维码,带logo二维码,自定义二维码,二维码工具">
    <meta name="description" content="专业二维码生成器，支持自定义配色、嵌入Logo、高容错设计。免费在线生成高质量PNG格式二维码，适用于网址、文本等各种场景。">
    <meta name="author" content="饺子与肉包">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:title" content="二维码生成器 | 支持Logo与配色">
    <meta property="og:description" content="免费在线生成自定义二维码，支持Logo和配色">
    <meta property="og:site_name" content="饺子与肉包工具箱">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <!-- 动态设置域名 -->
    <script>
        const DOMAIN = SITE_CONFIG.domain;
        document.addEventListener('DOMContentLoaded', function() {
            var canonical = document.querySelector('link[rel="canonical"]');
            if (canonical) canonical.href = DOMAIN + '/QRCode/';
            
            var ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.content = DOMAIN + '/QRCode/';
        });
    </script>
    <!-- QRCode.js 库 (v1.5.1) 提供稳定二维码生成能力 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="qr-card">
    <div class="header">
        <div class="header-left">
            <h1>QR Canvas 大师</h1>
            <p>自定义配色 · 嵌入 Logo · 高容错设计</p>
        </div>
        <a href="../index.html" class="btn-home">🏠 返回首页</a>
    </div>
    <div class="content">
        <!-- 左侧配置区域 -->
        <div class="controls">
            <!-- 文本输入 -->
            <div class="input-group">
                <label><i>📝</i> 内容 / 链接</label>
                <textarea id="qrText" rows="3" placeholder="输入网址、文本或任何信息...&#10;例如: https://github.com 或  Hello World"></textarea>
            </div>

            <!-- 配色方案 -->
            <div class="input-group">
                <label><i>🎨</i> 二维码配色</label>
                <div class="color-row">
                    <div class="color-picker-wrapper">
                        <span>前景色</span>
                        <input type="color" id="fgColor" value="#1E293B">
                    </div>
                    <div class="color-picker-wrapper">
                        <span>背景色</span>
                        <input type="color" id="bgColor" value="#FFFFFF">
                    </div>
                </div>
            </div>

            <!-- Logo 上传 + 管理 -->
            <div class="upload-zone">
                <label style="font-weight: 600; margin-bottom: 8px; display: block;"><i>🖼️</i> 中心 Logo</label>
                <input type="file" id="logoUpload" accept="image/png, image/jpeg, image/jpg, image/svg+xml, image/webp">
                <label for="logoUpload" class="file-label">📂 选择图片</label>
                <div class="logo-preview" id="logoPreviewArea" style="display: none;">
                    <div class="logo-thumb">
                        <img id="logoPreviewImg" alt="Logo预览 - 将嵌入到二维码中心">
                    </div>
                    <button id="clearLogoBtn" class="btn-clear-logo">移除 Logo</button>
                </div>
                <div class="info-tip" style="margin-top: 10px; text-align: left;">✓ 建议 PNG 透明背景，自动缩放至合适大小<br>✓ 高容错级别(H)保证扫码识别</div>
            </div>

            <div class="action-buttons">
                <button id="downloadBtn" class="btn-download">⬇️ 下载二维码 (PNG)</button>
            </div>
            <hr>
            <div class="info-tip">
                💡 提示：颜色对比度建议明显，Logo 会覆盖中心区域，但高容错仍可正常扫描。
            </div>
        </div>

        <!-- 右侧预览区域 -->
        <div class="preview-area">
            <div class="qr-canvas-wrapper">
                <canvas id="qrCanvas" width="300" height="300" style="width: 300px; height: 300px;"></canvas>
            </div>
            <div class="info-tip">
                ✨ 实时更新 · 支持透明背景logo
            </div>
        </div>
    </div>
</div>

<!-- 自定义脚本 -->
<script src="js/script.js"></script>
</body>
</html>
